<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkIQ — Book Your Slot</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0e1a;
    --surface:   #111827;
    --border:    #1e2d40;
    --accent:    #00d4ff;
    --accent2:   #0077ff;
    --green:     #22c55e;
    --yellow:    #eab308;
    --red:       #ef4444;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --font-head: 'Rajdhani', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── GRID BACKGROUND ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 480px;
    padding: 40px 36px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 60px rgba(0,212,255,0.05), 0 24px 48px rgba(0,0,0,0.4);
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-ring {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    position: relative;
  }
  .logo-ring::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.2);
  }
  .logo-ring svg { width: 28px; height: 28px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; }

  .header h1 {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .header h1 span { color: var(--accent); }
  .header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* ── SLOT STATUS PILL ── */
  .slot-pill {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.25);
    border-radius: 30px;
    padding: 8px 20px;
    margin-bottom: 28px;
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .slot-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.4); }
  }

  /* ── FORM ── */
  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    appearance: none;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    background: rgba(0,212,255,0.04);
  }
  input::placeholder { color: var(--muted); }

  select option { background: #1a2535; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ── TOKEN PREVIEW ── */
  .token-preview {
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .token-preview .label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .token-preview .value {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
  }
  .token-preview svg {
    width: 32px; height: 32px;
    stroke: rgba(0,212,255,0.4);
    fill: none; stroke-width: 1.5;
  }

  /* ── SUBMIT BUTTON ── */
  .btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 12px;
    color: #0a0e1a;
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn:hover { opacity: 0.92; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(10,14,26,0.3);
    border-top-color: #0a0e1a;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }

  /* ── STATUS MESSAGES ── */
  .status-msg {
    display: none;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 16px;
    text-align: center;
    font-weight: 500;
    line-height: 1.5;
  }
  .status-msg.success {
    display: block;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
    color: var(--green);
  }
  .status-msg.error {
    display: block;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .footer span { color: var(--accent); }

  /* ── DIVIDER ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
    </div>
    <h1>PARK<span>IQ</span></h1>
    <p>Smart Parking Reservation System</p>
  </div>

  <!-- Slot availability pill -->
  <div class="slot-pill">
    <div class="dot"></div>
    Slot 1 — Available for booking
  </div>

  <!-- Token preview -->
  <div class="token-preview">
    <div>
      <div class="label">Booking Token</div>
      <div class="value" id="tokenDisplay">SP-????</div>
    </div>
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>

  <!-- Form -->
  <p class="section-label">Your Details</p>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="e.g. Arjun Kumar" autocomplete="off">
  </div>

  <div class="form-group">
    <label>Vehicle Number</label>
    <input type="text" id="vehicle" placeholder="e.g. KL07AB1234" autocomplete="off" style="text-transform:uppercase">
  </div>

  <hr class="divider">
  <p class="section-label">Slot & Timing</p>

  <div class="row-2">
    <div class="form-group">
      <label>Slot Number</label>
      <select id="slot">
        <option value="1">Slot 1</option>
      </select>
    </div>
    <div class="form-group">
      <label>Duration</label>
      <select id="duration">
        <option value="30min">30 min</option>
        <option value="1hr" selected>1 Hour</option>
        <option value="2hr">2 Hours</option>
        <option value="3hr">3 Hours</option>
        <option value="4hr">4 Hours</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label>Arrival Time</label>
    <input type="time" id="arrivalTime">
  </div>

  <!-- Book button -->
  <button class="btn" id="bookBtn" onclick="bookSlot()">
    <span class="btn-text">BOOK SLOT</span>
    <div class="spinner"></div>
  </button>

  <!-- Status message -->
  <div class="status-msg" id="statusMsg"></div>

  <!-- Footer -->
  <div class="footer">
    Powered by <span>ParkIQ</span> · LoRa + ESP32 + Adafruit IO
  </div>

</div>

<script>
  // ── ADAFRUIT IO CREDENTIALS ─────────────────────────────
  const AIO_USER = "jay6025";
  const AIO_KEY  = "aio_eZxJ51BXW4okWtamRxwKldXPrJTF";
  const AIO_FEED = "booking-status";
  // ────────────────────────────────────────────────────────

  // Generate token on load
  function genToken() {
    const n = Math.floor(1000 + Math.random() * 9000);
    return "SP-" + n;
  }

  let currentToken = genToken();
  document.getElementById("tokenDisplay").textContent = currentToken;

  // Set default arrival time to now + 15min
  const now = new Date();
  now.setMinutes(now.getMinutes() + 15);
  const hh = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");
  document.getElementById("arrivalTime").value = hh + ":" + mm;

  // uppercase vehicle input
  document.getElementById("vehicle").addEventListener("input", function() {
    this.value = this.value.toUpperCase();
  });

  async function bookSlot() {
    const name     = document.getElementById("name").value.trim();
    const vehicle  = document.getElementById("vehicle").value.trim();
    const slot     = document.getElementById("slot").value;
    const duration = document.getElementById("duration").value;
    const time     = document.getElementById("arrivalTime").value;

    // Validate
    if (!name || !vehicle || !time) {
      showStatus("error", "Please fill in all fields before booking.");
      return;
    }
    if (vehicle.length < 4) {
      showStatus("error", "Please enter a valid vehicle number.");
      return;
    }

    // Build booking string — exact format ESP32 expects
    const bookingStr =
      `Token:${currentToken}|Slot:${slot}|Name:${name}|Vehicle:${vehicle}|Dur:${duration}|Time:${time}`;

    console.log("[ParkIQ] Booking string:", bookingStr);

    // UI loading state
    const btn = document.getElementById("bookBtn");
    btn.classList.add("loading");
    btn.disabled = true;
    clearStatus();

    try {
      const response = await fetch(
        `https://io.adafruit.com/api/v2/${AIO_USER}/feeds/${AIO_FEED}/data`,
        {
          method: "POST",
          headers: {
            "X-AIO-Key": AIO_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ value: bookingStr })
        }
      );

      if (response.ok) {
        showStatus("success",
          `Booking confirmed!\n\nToken: ${currentToken}\nSlot ${slot} reserved for ${name}\nArrival: ${time} · Duration: ${duration}\n\nPlease show this token at the gate.`
        );
        // Regenerate token for next booking
        setTimeout(() => {
          currentToken = genToken();
          document.getElementById("tokenDisplay").textContent = currentToken;
        }, 2000);
      } else {
        const err = await response.json();
        showStatus("error", "Booking failed: " + (err.error || response.status));
      }

    } catch (e) {
      showStatus("error", "Network error. Check your internet connection and try again.");
      console.error("[ParkIQ] Error:", e);
    }

    btn.classList.remove("loading");
    btn.disabled = false;
  }

  function showStatus(type, msg) {
    const el = document.getElementById("statusMsg");
    el.className = "status-msg " + type;
    el.style.whiteSpace = "pre-line";
    el.textContent = msg;
  }

  function clearStatus() {
    const el = document.getElementById("statusMsg");
    el.className = "status-msg";
    el.textContent = "";
  }
</script>

</body>
</html>
